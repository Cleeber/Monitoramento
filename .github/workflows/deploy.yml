name: Deploy to EasyPanel

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: |
          backend/package-lock.json
          frontend/package-lock.json
    
    - name: Install backend dependencies
      run: |
        cd backend
        npm ci
        
    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci
        
    - name: Build backend
      run: |
        cd backend
        npm run build
        
    - name: Build frontend
      run: |
        cd frontend
        npm run build
        
    - name: Run backend tests
      run: |
        cd backend
        npm test || echo "No tests found"
        
    - name: Run frontend tests
      run: |
        cd frontend
        npm test || echo "No tests found"
        
    - name: Trigger EasyPanel Deploy
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      run: |
        echo "Deploy triggered for EasyPanel"
        echo "Backend and Frontend builds completed successfully"
        # EasyPanel will automatically detect changes and redeploy
        # when connected to this GitHub repository